name: Windows:RosBridge

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          committish: '2024.12.16'
          cache: true

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-installed-${{ runner.os }}-x64-windows-vcpkg2024.12.16-qt5-boost-opencv-eigen3
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-x64-windows-

      - name: Install Dependencies via Manifest
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        env:
          VCPKG_DISABLE_METRICS: 1
        run: |
          "%VCPKG_ROOT%\vcpkg.exe" install --triplet x64-windows --x-install-root="%VCPKG_ROOT%\installed"

      - name: Build via project script
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          build.bat

      - name: Test
        run: |
          ctest --test-dir build -C Release --output-on-failure

      - name: Package Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build\install\bin
          powershell Compress-Archive -Path * -DestinationPath ros_qt5_gui_app_windows_x64.zip -Force

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ros_qt5_gui_app_windows_x64
          path: build/install/bin/ros_qt5_gui_app_windows_x64.zip

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: build/install/bin/ros_qt5_gui_app_windows_x64.zip
          generate_release_notes: true
          body: |
            ## Release assets (this workflow + sibling CI)

            This workflow publishes the **Windows** package. Other workflows upload Linux/ROS tarballs to the **same** release tag (see Assets); only this job updates the release description.

            ### Windows (x64)
            - **Artifact:** `ros_qt5_gui_app_windows_x64.zip` — full `build/install/bin` folder, including Qt and runtime DLLs.
            - **Build:** `windows-latest`, dependencies from the vcpkg manifest; `build.bat` configures, builds, and installs.
            - **Run:** unzip and run `ros_qt5_gui_app.exe` from the extracted folder.

            ### ROS 2 (Linux x86_64, `.tar.gz` of `build/install/bin`)
            - **Galactic:** `ros_qt5_gui_app_galactic_x86_64.tar.gz`
            - **Humble:** `ros_qt5_gui_app_humble_x86_64.tar.gz`
            - **Foxy:** `ros_qt5_gui_app_foxy_x86_64.tar.gz`

            ### ROS 1 (Linux x86_64, `.tar.gz` of `build/install/bin`)
            - **Noetic:** `ros_qt5_gui_app_noetic_x86_64.tar.gz`
            - **Melodic:** `ros_qt5_gui_app_melodic_x86_64.tar.gz`

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
