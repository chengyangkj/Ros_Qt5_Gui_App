name: ROS1:Melodic(18.04)

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            osrf/ros:melodic-desktop \
            bash -lc '
              set -e
              apt-get update && apt-get install -y wget git
              wget https://github.com/Kitware/CMake/releases/download/v3.20.0/cmake-3.20.0-linux-x86_64.sh
              chmod +x cmake-3.20.0-linux-x86_64.sh
              ./cmake-3.20.0-linux-x86_64.sh --prefix=/usr/local --skip-license
              ln -sf /usr/local/bin/cmake /usr/bin/cmake
              source /opt/ros/melodic/setup.bash
              rm -rf build
              chmod +x ./build.sh
              ./build.sh -DBUILD_WITH_TEST=OFF
            '

      - name: Package Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/install/bin
          tar -czvf ros_qt5_gui_app_melodic_x86_64.tar.gz ./*

      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ros_qt5_gui_app_melodic_x86_64
          path: build/install/bin/ros_qt5_gui_app_melodic_x86_64.tar.gz

  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ros_qt5_gui_app_melodic_x86_64
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/ros_qt5_gui_app_melodic_x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
